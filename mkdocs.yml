site_name: Database Tycoon
site_description: A local-first analytics CLI for exploring any dataset.
site_url: https://database-tycoon.github.io/tycoon-cli/
repo_url: https://github.com/Database-Tycoon/tycoon-cli
repo_name: Database-Tycoon/tycoon-cli
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Database-Tycoon/tycoon-cli
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/database-tycoon/

nav:
  - Home: index.md
  - Getting started:
    - getting-started/installation.md
    - getting-started/first-project.md
    - getting-started/concepts.md
  - Commands:
    - commands/index.md
    - "tycoon data sync": commands/data/sync.md
    - "tycoon ask": commands/ask/index.md
  - Reference:
    - reference/tycoon-yml.md
    - reference/templates.md
  - Releases:
    - "v0.1.4 (in flight)": releases/v0.1.4.md
    - "v0.1.3": releases/v0.1.3.md
    - "v0.1.2": releases/v0.1.2.md
    - "v0.1.1": releases/v0.1.1.md

# Pages not in nav (not user-facing): docs/openmetadata.md, docs/publishing-to-pypi.md
# Suppress mkdocs warnings about them.
not_in_nav: |
  /openmetadata.md
  /publishing-to-pypi.md
  /install_rill.sh

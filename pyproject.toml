[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "database-tycoon"
version = "0.1.2"
description = "Database Tycoon — local-first analytics CLI that adapts to your existing data stack"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Database Tycoon Team"}]
requires-python = ">=3.12"
keywords = ["data", "analytics", "duckdb", "dbt", "dlt", "cli"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
]
dependencies = [
    "typer==0.24.1",
    "rich==15.0.0",
    "dbt-core==1.11.8",
    "dbt-duckdb==1.10.1",
    "dlt[duckdb]==1.25.0",
    "duckdb==1.5.2",
    "httpx==0.28.1",
    "pyyaml==6.0.3",
    "pydantic==2.13.2",
]

[project.optional-dependencies]
server = [
    "fastapi==0.136.0",
    "uvicorn[standard]==0.44.0",
    "websockets==16.0",
]
dagster = [
    "dagster==1.13.0",
    "dagster-webserver==1.13.0",
    "dagster-dbt==0.29.0",
    "dagster-dlt==0.29.0",
]
ask = [
    "nao-core==0.1.7",
    "ibis-framework[duckdb]==12.0.0",
]

[project.urls]
Homepage = "https://github.com/Database-Tycoon/tycoon-cli"
Repository = "https://github.com/Database-Tycoon/tycoon-cli"
Issues = "https://github.com/Database-Tycoon/tycoon-cli/issues"

[dependency-groups]
dev = ["pytest==9.0.3"]

[project.scripts]
tycoon = "tycoon.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/tycoon"]

[tool.uv]
prerelease = "if-necessary-or-explicit"

[tool.pytest.ini_options]
markers = [
    "e2e: network-gated end-to-end tests (opt-in: `pytest -m e2e`). Skipped by default.",
]
addopts = "-m 'not e2e'"

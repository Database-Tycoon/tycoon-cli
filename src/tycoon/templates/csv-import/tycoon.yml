name: csv-import
version: 0.1.0
description: Import CSV or Parquet files from a local directory into DuckDB

database:
  raw: data/files_raw.duckdb
  warehouse: data/files_warehouse.duckdb

dbt_project_dir: dbt_project
rill_dir: rill

sources:
  files:
    type: filesystem
    schema: raw_files
    config:
      path: data/input
      file_glob: "*.csv"

name: Bug report
description: Something broke or behaved in a way you didn't expect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. A rough description and the command you ran is plenty — we can dig from there.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The exact command(s), if there was one.
      render: shell
    validations:
      required: false
  - type: input
    id: tycoon-version
    attributes:
      label: tycoon version
      description: Output of `tycoon --version`
      placeholder: "0.1.9"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
        - Other
    validations:
      required: true
  - type: textarea
    id: stack
    attributes:
      label: Stack config
      description: The `stack:` block from your `tycoon.yml`, if relevant (ingestion / warehouse / bi / orchestrator).
      render: yaml
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste any error output. It will be formatted as code.
      render: shell
    validations:
      required: false

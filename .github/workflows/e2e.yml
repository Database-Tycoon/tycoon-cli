name: End-to-end template tests

# Manual trigger only. See tests/test_templates_e2e.py and pyproject.toml's
# `[tool.pytest.ini_options]` — the `e2e` marker is excluded from the default
# `pytest` run, so these hit live APIs only when someone clicks "Run workflow"
# in the Actions UI. (No cron: would burn CI minutes for no one's benefit.)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv sync --all-extras
      - name: Run e2e template tests
        env:
          GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
        run: uv run pytest -m e2e -v

name: Publish to PyPI
on:
  push:
    tags:
      - "v*"

# No default grants — each job asks for exactly what it needs. The publish
# jobs hold the OIDC token (id-token: write), so keep the floor at zero.
permissions: {}

jobs:
  preflight:
    # Fail-fast gate before any artifact builds. Validates that the tag,
    # the version pins, and the release-notes machinery all agree —
    # catches half-prepared releases (CHANGELOG still says UNRELEASED,
    # __version__ wasn't bumped, etc.) before they hit PyPI.
    name: pre-flight (version + changelog coherence)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate version + changelog coherence
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"               # e.g. v0.1.4
          VERSION="${TAG#v}"                            # e.g. 0.1.4

          echo "Validating tag=${TAG} version=${VERSION}"

          # 1. pyproject.toml version must match the tag.
          PYPROJECT_VERSION=$(awk -F'"' '/^version *= *"/ { print $2; exit }' pyproject.toml)
          if [ "$PYPROJECT_VERSION" != "$VERSION" ]; then
            echo "::error::pyproject.toml version=${PYPROJECT_VERSION} does not match tag ${TAG}"
            exit 1
          fi

          # 2. src/tycoon/__init__.py __version__ must match the tag.
          INIT_VERSION=$(awk -F'"' '/^__version__ *= *"/ { print $2; exit }' src/tycoon/__init__.py)
          if [ "$INIT_VERSION" != "$VERSION" ]; then
            echo "::error::src/tycoon/__init__.py __version__=${INIT_VERSION} does not match tag ${TAG}"
            exit 1
          fi

          # 3. CHANGELOG.md must have a dated entry — not UNRELEASED.
          if ! grep -q "^## \[${VERSION}\] - 20" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a dated '## [${VERSION}] - YYYY-MM-DD' entry"
            grep -E "^## \[${VERSION}\]" CHANGELOG.md || true
            exit 1
          fi

          # 4. docs/releases/v<version>.md must exist with a real Released line.
          RELEASE_NOTES="docs/releases/v${VERSION}.md"
          if [ ! -f "$RELEASE_NOTES" ]; then
            echo "::error::missing $RELEASE_NOTES"
            exit 1
          fi
          if grep -q "_Released: TBD_" "$RELEASE_NOTES"; then
            echo "::error::$RELEASE_NOTES still has '_Released: TBD_' — set the date before tagging"
            exit 1
          fi

          echo "OK — pyproject, __init__, CHANGELOG, and release notes all agree on ${VERSION}"

  build:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/
  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
